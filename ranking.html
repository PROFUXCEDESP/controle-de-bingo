<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Oficial CEDESP</title>
    <link rel="icon" href="assets/image/logo_cedesp.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    <style>
        body { background-color: #fcf9fc; padding-top: 2rem; padding-bottom: 3rem; }
        .ranking-header { text-align: center; margin-bottom: 3rem; }
        .ranking-header img { max-width: 250px; margin-bottom: 1rem; }
        .ranking-header h1 { color: var(--petal-pink); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .ranking-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .ranking-section { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(188, 104, 161, 0.1); margin-bottom: 3rem; }
        .section-title { text-align: center; margin-bottom: 2rem; color: var(--dim-grey); font-size: 1.8rem; border: none; }
        .purple-input { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ccc; color: var(--dim-grey); font-size: 1rem; outline: none; transition: all 0.3s ease; }
        .purple-input:focus { border-color: var(--petal-pink) !important; box-shadow: 0 0 0 3px rgba(188, 104, 161, 0.2) !important; }
        .loader { text-align: center; font-size: 1.5rem; color: var(--petal-pink); font-weight: bold; margin: 3rem 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="ranking-header">
        <img src="assets/image/logo_cedesp.png" alt="Logo CEDESP">
        <h1>Ranking Oficial Bingo 2026</h1>
    </div>

    <div class="ranking-container">
        <div id="loader" class="loader">Atualizando dados ao vivo...</div>

        <div id="conteudoRanking" style="display: none;">
            <div class="ranking-section">
                <h2 class="section-title"><span class="material-symbols-outlined" style="font-size: 2.2rem; color: var(--sunflower-gold); vertical-align: middle;">emoji_events</span> Top Educandos</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 1rem; align-items: center;">
                    <input type="text" id="buscaRankingPublico" class="purple-input" placeholder="Pesquisar aluno no ranking..." style="flex: 1;">
                </div>
                <div class="table-container" style="overflow-x: auto; margin-bottom: 1rem;">
                    <table class="data-table" style="min-width: 800px;">
                        <thead>
                            <tr><th class="text-center">Pos.</th><th>Foto</th><th>Nome do Educando</th><th>Turma</th><th class="text-center">Retirados</th><th class="text-center">Vendidos</th><th class="text-center">Pendentes</th><th class="text-center">Cartelas Ganhas</th><th class="text-center">Fone</th></tr>
                        </thead>
                        <tbody id="tabelaRankingAlunosPublico"></tbody>
                    </table>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn-primary" onclick="mudarPaginaRankingPublico(-1)" style="padding: 5px 15px; background:var(--dim-grey);">&laquo; Anterior</button>
                    <span id="infoPaginaPublica" style="font-weight: bold; color: var(--dim-grey);">Página 1</span>
                    <button class="btn-primary" onclick="mudarPaginaRankingPublico(1)" style="padding: 5px 15px; background:var(--dim-grey);">Próxima &raquo;</button>
                </div>
            </div>

            <div class="ranking-section">
                <h2 class="section-title"><span class="material-symbols-outlined" style="font-size: 2.2rem; color: var(--petal-pink); vertical-align: middle;">school</span> Top Educadores</h2>
                <div class="table-container" style="overflow-x: auto;">
                    <table class="data-table" style="min-width: 600px;">
                        <thead>
                            <tr><th class="text-center">Posição</th><th>Nome do Educador</th><th>Curso</th><th class="text-center">Lotes Consolidados</th><th class="text-center">Valor Arrecadado</th></tr>
                        </thead>
                        <tbody id="tabelaRankingEducadoresPublico"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWD-pi7qf1Vlp01I8CO-7euJmqsNureruSEjeFc9bdYUZ_M13he6bqBC_ctJGHUpc4ow/exec'; 

        let educandosGlobal = [];
        let educadoresGlobal = [];
        let paginaAtual = 1;
        let termoBusca = "";

        function calcularRecompensas(qtdVendidos) {
            let fone = qtdVendidos >= 10 ? 1 : 0;
            let cartelas = qtdVendidos >= 10 ? 1 + Math.floor((qtdVendidos - 10) / 5) : 0;
            return { fone, cartelas };
        }

        function renderizarRankingPagina() {
            let filtrados = [...educandosGlobal].sort((a, b) => b.lotesVendidos.length - a.lotesVendidos.length);
            filtrados = filtrados.filter(a => a.lotesVendidos.length > 0 || a.lotesPendentes.length > 0);

            if(termoBusca) {
                filtrados = filtrados.filter(a => a.nome.toLowerCase().includes(termoBusca.toLowerCase()));
            }

            const totalPaginas = Math.ceil(filtrados.length / 10) || 1;
            if(paginaAtual > totalPaginas) paginaAtual = totalPaginas;
            if(paginaAtual < 1) paginaAtual = 1;

            const inicio = (paginaAtual - 1) * 10;
            const loteAtual = filtrados.slice(inicio, inicio + 10);

            const tabelaAlunos = document.getElementById('tabelaRankingAlunosPublico');
            tabelaAlunos.innerHTML = "";

            loteAtual.forEach((aluno, index) => {
                const pos = inicio + index + 1;
                const rec = calcularRecompensas(aluno.lotesVendidos.length);
                const cartelasHTML = rec.cartelas > 0 ? `<div style="font-weight:bold; color:var(--sunflower-gold);">${rec.cartelas}</div>` : '-';
                const foneHTML = rec.fone > 0 ? '<span class="material-symbols-outlined" style="color:var(--petal-pink);">headphones</span>' : '-';
                let posHtml = pos === 1 ? '<span class="material-symbols-outlined" style="color:var(--sunflower-gold); font-size:2rem;">trophy</span>' : `<span style="font-weight:bold; font-size:1.2rem;">${pos}º</span>`;
                
                tabelaAlunos.innerHTML += `<tr>
                    <td class="td-center">${posHtml}</td>
                    <td><img src="${aluno.foto}" class="table-avatar" style="width: 50px; height: 50px; border-radius: 50%;"></td>
                    <td><strong style="font-size:1.1rem; color:var(--obsidian);">${aluno.nome}</strong><br><small style="color:#a0a0a0">Educador: ${aluno.educadorResponsavel}</small></td>
                    <td style="color: var(--dim-grey);">${aluno.turma}</td>
                    <td class="td-center">${aluno.lotesVendidos.length + aluno.lotesPendentes.length}</td>
                    <td class="td-center highlight-purple" style="font-size:1.2rem; font-weight:bold;">${aluno.lotesVendidos.length}</td>
                    <td class="td-center">${aluno.lotesPendentes.length}</td>
                    <td class="td-center">${cartelasHTML}</td>
                    <td class="td-center">${foneHTML}</td>
                </tr>`;
            });

            if (loteAtual.length === 0) tabelaAlunos.innerHTML = '<tr><td colspan="9" class="text-center" style="padding: 20px; color: #a0a0a0;">Nenhum aluno encontrado no ranking.</td></tr>';
            document.getElementById("infoPaginaPublica").innerText = `Página ${paginaAtual} de ${totalPaginas}`;
        }

        window.mudarPaginaRankingPublico = function(dir) {
            paginaAtual += dir;
            renderizarRankingPagina();
        }

        document.getElementById('buscaRankingPublico').addEventListener('input', (e) => {
            termoBusca = e.target.value;
            paginaAtual = 1;
            renderizarRankingPagina();
        });

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'sincronizar_dados' }) })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                educandosGlobal = data.educandos.map(e => ({
                    nome: e['Nome_Educando'] || e['Nome'], 
                    turma: e['Turma'], 
                    educadorResponsavel: e['Educador_Responsavel'] || '',
                    foto: e['Foto_URL'] && String(e['Foto_URL']).trim() !== '' ? e['Foto_URL'] : `https://ui-avatars.com/api/?name=${e['Nome_Educando'] || e['Nome']}&background=BC68A1&color=fff`,
                    lotesVendidos: e['Lotes_Vendidos'] ? String(e['Lotes_Vendidos']).split(',').map(s=>s.trim()).filter(Boolean) : [],
                    lotesPendentes: e['Lotes_Pendentes'] ? String(e['Lotes_Pendentes']).split(',').map(s=>s.trim()).filter(Boolean) : []
                }));

                const educadoresGlobal = data.educadores.map(e => {
                    let vendidos = 0;
                    educandosGlobal.forEach(al => { if(al.educadorResponsavel.toLowerCase() === String(e['Nome']).toLowerCase()) vendidos += al.lotesVendidos.length; });
                    return { nome: e['Nome'], curso: e['Curso Responsavel'], lotesVendidos: vendidos };
                });

                renderizarRankingPagina();

                const tabelaProf = document.getElementById('tabelaRankingEducadoresPublico');
                let rankingProf = [...educadoresGlobal].sort((a, b) => b.lotesVendidos - a.lotesVendidos);
                rankingProf.forEach((prof, index) => {
                    let posHtml = index === 0 ? '<span class="material-symbols-outlined" style="color:var(--petal-pink); font-size:2rem;">workspace_premium</span>' : `<span style="font-weight:bold; font-size:1.2rem; color:var(--petal-pink);">${index + 1}º</span>`;
                    const valorArrecadado = (prof.lotesVendidos * 20).toFixed(2).replace('.', ',');
                    tabelaProf.innerHTML += `<tr>
                        <td class="td-center">${posHtml}</td>
                        <td><strong style="font-size:1.1rem; color:var(--obsidian);">${prof.nome}</strong></td>
                        <td style="color: var(--dim-grey);">${prof.curso}</td>
                        <td class="td-center" style="font-weight: bold; font-size: 1.2rem;">${prof.lotesVendidos}</td>
                        <td class="td-center highlight-purple" style="font-weight: bold;">R$ ${valorArrecadado}</td>
                    </tr>`;
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('conteudoRanking').style.display = 'block';
            }
        }).catch(err => {
            document.getElementById('loader').innerText = "Erro ao carregar os dados ao vivo. Tente atualizar a página.";
        });
    </script>
</body>
</html>
